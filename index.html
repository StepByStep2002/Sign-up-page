<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="javascript.js"></script>
    <title>Sign-Up Form</title>
</head>
<body>
    <div class="page-content">

        <div class="side-wallpaper">
            <div class="side-wallpaper-flex-container">
                
                <div class="odin-logo">
                    <img src="odin-lined.png" alt="logo image of The Odin Project that looks like a head of the viking with a beard">

                    <div>ODIN</div>
                </div>

                <div class="credits">
                    Photo by <a href="https://unsplash.com/@ideasboom?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Qingbao Meng</a> 
                    on <a href="https://unsplash.com/photos/birds-eye-view-photograph-of-green-mountains-01_igFr7hd4?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
      
                </div>

            </div>
        </div>


        <div class="main-content">

            <header>
                <div class="header-text">
                    <div>
                        <p>This is not a real online service! You know you need somethign like this in your life to help you realize your deepest dreams.</p>
                        <p id="header-second-p">Sign up <em>now</em> to get started.</p>
                    </div>
                    <p>You <em>know</em> you want to.</p>
                </div>
            </header>

            <form action="" method="post" id="sign-up-form">
                <div class="form-content">
                    <h2>Let's do this!</h2>

                    <div class="form-flex-container">

                        <div class="form-inputs">
                            <div class="form-input">
                                <label for="first-name">FIRST NAME</label>
                                <input type="text" id="first-name" name="first-name" required>
                            </div>
                            <div class="form-input">
                                <label for="last-name">LAST NAME</label>
                                <input type="text" id="last-name" name="last-name" required>
                            </div>
                        </div>
                        
                        <div class="form-inputs">
                            <div class="form-input">
                                <label for="email">EMAIL</label>
                                <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
                            </div>
                            <div class="form-input">
                                <label for="phone-number">PHONE NUMBER</label>
                                <input type="number" id="phone-number" name="phone-number" required>
                            </div>
                        </div>

                        <div class="form-inputs">
                            <div class="form-input">
                                <label for="password">PASSWORD</label>
                                <input type="password" id="password" name="password" required>
                            </div>
                            <div class="form-input">
                                <label for="confirm-password">CONFIRM PASSWORD</label>
                                <input type="password" id="confirm-password" name="confirm-password" required>
                            </div>
                        </div>

                    </div>
                </div>
            </form>

            <footer>
                <div class="footer-content">
                    <button type="submit" class="submit-button" form="sign-up-form">Create Account</button>

                    <p id="login-text">Already have an account? <a href="" id="login">Log in</a></p>
                </div>
            </footer>
        </div>

    </div>
</body>
</html>
