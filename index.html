<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="javascript.js"></script>
    <title>Document</title>
</head>
<body>
    <div>
        <div class="side-wallpaper">

            <div class="odin-logo">
                ODIN
            </div>

            <div class="credits">
                Photo by <a href="https://unsplash.com/@urban_vintage?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Urban Vintage</a> 
                on <a href="https://unsplash.com/photos/landscape-photography-of-mountain-hit-by-sun-rays-78A265wPiO4?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
            </div>
        </div>


        <div class="main-content">

            <header>
                <p>This is not a real online service! You know you need somethign like this in your life to help you realize your deepest dreams.
                    Sign up now to get started.
                </p>
                <p>You <i>know</i> you want to.</p>
            </header>
            <form action="" method="post">
                <h2>Let's do this!</h2>

                <div class="form-input">
                    <label for="first-name">FIRST NAME</label>
                    <input type="text" id="first-name" name="first-name" required>
                </div>
                <div class="form-input">
                    <label for="last-name">LAST NAME</label>
                    <input type="text" id="last-name" name="last-name" required>
                </div>
                <div class="form-input">
                    <label for="email">EMAIL</label>
                    <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
                </div>
                <div class="form-input">
                    <label for="phone-number">PHONE NUMBER</label>
                    <input type="number" id="phone-number" name="phone-number" required>
                </div>
                <div class="form-input">
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-input">
                    <label for="confirm-password">CONFIRM PASSWORD</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                </div>
            </form>

            <footer>
                <input type="button" value="Create Account">

                <p>Already have an account? <a href="">Log in</a></p>
            </footer>
        </div>
    </div>

</body>
</html>
